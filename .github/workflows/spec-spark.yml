name: SPEC Spark

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Which content to generate
        type: choice
        required: true
        default: all
        options:
          - all
          - spark
          - highlights
          - research
  schedule:
    - cron: '0 11 * * *'    # Daily Spark
    - cron: '5 11 * * 1'    # Monday Highlights
    - cron: '15 11 * * 1'   # Monday Research Scan

permissions:
  contents: read
  issues: write

jobs:
  spark-draft:
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'all' || github.event.inputs.run_mode == 'spark')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SPEC Website
        uses: actions/checkout@v5

      - name: Build daily SPEC Spark post
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          files = sorted(Path('.').glob('*.html'))
          pages = []

          for f in files:
              text = f.read_text(encoding='utf-8', errors='ignore')
              m = re.search(r'<title>(.*?)</title>', text, re.I | re.S)
              title = re.sub(r'\s+', ' ', m.group(1)).strip() if m else f.stem.replace('-', ' ').title()
              url = 'https://specpediatrics.github.io/' if f.name == 'index.html' else f'https://specpediatrics.github.io/{f.name}'
              pages.append((title, url))

          with open('spark.md', 'w', encoding='utf-8') as out:
              out.write('# SPEC Spark Daily Post\n\n')
              out.write("Here is today's SPEC roundup pulled from the current website, even if nothing new was added.\n\n")
              out.write('## Website spotlight\n\n')
              for title, url in pages[:8]:
                  out.write(f'- **{title}**\n')
                  out.write(f'  {url}\n')
              out.write('\n---\n\n')
              out.write('## Facebook\n')
              out.write('Today on SPEC: pediatric education resources for families, trainees, and clinicians across West Texas. Explore the latest pages here: https://specpediatrics.github.io\n\n')
              out.write('## Instagram\n')
              out.write("Today's SPEC spotlight: practical pediatric education for families and trainees. #pediatrics #meded #complexcare #PICU\n\n")
              out.write('## X\n')
              out.write("Today's SPEC spotlight: practical pediatric education for families and trainees. https://specpediatrics.github.io #Pediatrics #MedEd #PICU\n")
          PY

      - name: Create daily issue
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "SPEC Spark Daily Post #${{ github.run_number }}"
          content-filepath: spark.md
          labels: |
            spark
            automation

      - name: Upload daily artifact
        uses: actions/upload-artifact@v4
        with:
          name: spec-spark-daily-${{ github.run_number }}
          path: spark.md
          retention-days: 7

      - name: Email daily post
        uses: dawidd6/action-send-mail@v6
        with:
          connection_url: ${{ secrets.MAIL_CONNECTION }}
          subject: "SPEC Spark Daily Post"
          to: weerapong_l@hotmail.com
          from: "SPEC Spark <weerapong_l@hotmail.com>"
          html_body: file://spark.md
          convert_markdown: true
          attachments: spark.md

  weekly-highlights:
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'all' || github.event.inputs.run_mode == 'highlights')) ||
      (github.event_name == 'schedule' && github.event.schedule == '5 11 * * 1')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SPEC Website
        uses: actions/checkout@v5

      - name: Build weekly highlights post
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          files = sorted(Path('.').glob('*.html'))
          pages = []

          for f in files:
              text = f.read_text(encoding='utf-8', errors='ignore')
              m = re.search(r'<title>(.*?)</title>', text, re.I | re.S)
              title = re.sub(r'\s+', ' ', m.group(1)).strip() if m else f.stem.replace('-', ' ').title()
              url = 'https://specpediatrics.github.io/' if f.name == 'index.html' else f'https://specpediatrics.github.io/{f.name}'
              pages.append((title, url))

          with open('weekly-highlights.md', 'w', encoding='utf-8') as out:
              out.write('# SPEC Weekly Highlights\n\n')
              out.write('A Monday morning highlight post from the current SPEC website.\n\n')
              out.write("## This week's highlights\n\n")
              for title, url in pages[:12]:
                  out.write(f'- **{title}**\n')
                  out.write(f'  {url}\n')
              out.write('\n---\n\n')
              out.write('## Facebook\n')
              out.write('SPEC Weekly Highlights: explore pediatric education resources for families, trainees, and clinicians. https://specpediatrics.github.io\n\n')
              out.write('## Instagram\n')
              out.write('New week, new SPEC highlights. Pediatric learning made practical. #pediatrics #meded #WestTexas #PICU\n\n')
              out.write('## X\n')
              out.write('SPEC Weekly Highlights are live. Explore practical pediatric learning resources: https://specpediatrics.github.io #Pediatrics #MedEd #WestTexas\n')
          PY

      - name: Create weekly issue
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "SPEC Weekly Highlights #${{ github.run_number }}"
          content-filepath: weekly-highlights.md
          labels: |
            weekly-highlights
            automation

      - name: Upload weekly artifact
        uses: actions/upload-artifact@v4
        with:
          name: spec-weekly-highlights-${{ github.run_number }}
          path: weekly-highlights.md
          retention-days: 7

      - name: Email weekly highlights
        uses: dawidd6/action-send-mail@v6
        with:
          connection_url: ${{ secrets.MAIL_CONNECTION }}
          subject: "SPEC Weekly Highlights"
          to: weerapong_l@hotmail.com
          from: "SPEC Spark <weerapong_l@hotmail.com>"
          html_body: file://weekly-highlights.md
          convert_markdown: true
          attachments: weekly-highlights.md

  research-scan:
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'all' || github.event.inputs.run_mode == 'research')) ||
      (github.event_name == 'schedule' && github.event.schedule == '15 11 * * 1')
    runs-on: ubuntu-latest

    steps:
      - name: Build Monday research scan
        run: |
          python <<'PY'
          import json
          import urllib.parse
          import urllib.request

          topics = [
              'pediatric tracheostomy',
              'children with medical complexity',
              'pediatric critical care',
              'pediatric pulmonology'
          ]

          def get_ids(term):
              url = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?' + urllib.parse.urlencode({
                  'db': 'pubmed',
                  'retmode': 'json',
                  'sort': 'pub_date',
                  'retmax': 3,
                  'term': term
              })
              with urllib.request.urlopen(url, timeout=30) as r:
                  data = json.load(r)
              return data.get('esearchresult', {}).get('idlist', [])

          def get_summaries(ids):
              if not ids:
                  return []
              url = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?' + urllib.parse.urlencode({
                  'db': 'pubmed',
                  'retmode': 'json',
                  'id': ','.join(ids)
              })
              with urllib.request.urlopen(url, timeout=30) as r:
                  data = json.load(r)

              result = []
              store = data.get('result', {})
              for pmid in ids:
                  rec = store.get(pmid, {})
                  result.append({
                      'pmid': pmid,
                      'title': rec.get('title', 'Untitled'),
                      'pubdate': rec.get('pubdate', '')
                  })
              return result

          with open('research-scan.md', 'w', encoding='utf-8') as out:
              out.write('# SPEC Monday Research Scan\n\n')
              out.write('Recent PubMed picks for SPEC focus areas.\n\n')

              for topic in topics:
                  out.write(f'## {topic.title()}\n')
                  out.write(f'PubMed search: https://pubmed.ncbi.nlm.nih.gov/?term={urllib.parse.quote_plus(topic)}\n\n')
                  try:
                      ids = get_ids(topic)
                      summaries = get_summaries(ids)
                      if summaries:
                          for item in summaries:
                              out.write(f"- **{item['title']}** ({item['pubdate']})\n")
                              out.write(f"  https://pubmed.ncbi.nlm.nih.gov/{item['pmid']}/\n")
                      else:
                          out.write('- No recent items returned.\n')
                  except Exception as e:
                      out.write(f'- Scan error for this topic: {e}\n')
                  out.write('\n')

              out.write('---\n\n')
              out.write('## Social caption\n')
              out.write('SPEC Monday Research Scan is out: recent pediatric literature in tracheostomy, complex care, critical care, and pulmonology.\n')
          PY

      - name: Create research issue
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "SPEC Monday Research Scan #${{ github.run_number }}"
          content-filepath: research-scan.md
          labels: |
            research-scan
            automation

      - name: Upload research artifact
        uses: actions/upload-artifact@v4
        with:
          name: spec-research-scan-${{ github.run_number }}
          path: research-scan.md
          retention-days: 7

      - name: Email research scan
        uses: dawidd6/action-send-mail@v6
        with:
          connection_url: ${{ secrets.MAIL_CONNECTION }}
          subject: "SPEC Monday Research Scan"
          to: weerapong_l@hotmail.com
          from: "SPEC Spark <weerapong_l@hotmail.com>"
          html_body: file://research-scan.md
          convert_markdown: true
          attachments: research-scan.md

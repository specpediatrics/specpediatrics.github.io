name: SPEC Spark

on:
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'   # Daily check (11:17 UTC)
    - cron: '23 12 * * 1'   # Weekly highlights Monday (12:23 UTC)
    - cron: '29 13 * * 3'   # Research scan Wednesday (13:29 UTC)
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '17 11 * * *'

    outputs:
      changed: ${{ steps.detect.outputs.changed }}

    steps:
      - name: Checkout SPEC Website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Website Changes
        id: detect
        run: |
          echo "Checking for HTML changes..."

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGES=$(git log --since="36 hours ago" --name-only --pretty="" | grep -E '\.html$' | sort -u | wc -l || true)

          if [ "$CHANGES" -gt "0" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  spark-draft:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SPEC Website
        uses: actions/checkout@v4

      - name: Extract Page Titles
        run: |
          find . -name "*.html" -exec grep -H "<title>" {} \; > titles.txt || true

      - name: Generate Social Media Draft
        run: |
          echo "# SPEC Spark Draft Social Media Post" > draft.md
          echo "" >> draft.md
          echo "New pediatric education resources available from SPEC." >> draft.md
          echo "https://specpediatrics.github.io" >> draft.md
          echo "" >> draft.md

          echo "## FACEBOOK" >> draft.md
          echo "Explore pediatric education for families, trainees, and the West Texas community through SPEC." >> draft.md
          echo "#pediatrics #complexcare #familyeducation #meded" >> draft.md
          echo "" >> draft.md

          echo "## X POST" >> draft.md
          echo "🩺 New pediatric education resources from SPEC are live." >> draft.md
          echo "Explore: https://specpediatrics.github.io" >> draft.md
          echo "#PICU #Peds #MedEd #ComplexCare" >> draft.md
          echo "" >> draft.md

          echo "## INSTAGRAM CAPTION" >> draft.md
          echo "Helping families and trainees better understand complex pediatric care — one practical resource at a time." >> draft.md
          echo "#pediatrics #complexcarekids #tracheostomy #PICU #medicaleducation" >> draft.md
          echo "" >> draft.md

          echo "## TIKTOK IDEA" >> draft.md
          echo "60-second teaching pearl: Explain pediatric tracheostomy care or a PICU concept using simple family-friendly language." >> draft.md
          echo "" >> draft.md

          echo "## PAGE TITLES DETECTED" >> draft.md
          cat titles.txt >> draft.md || true

      - name: Create Review Issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "SPEC Spark Social Media Draft"
          content-filepath: draft.md
          labels: draft,spec-spark

  approved-post:
    if: github.event_name == 'issues' && github.event.label.name == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Approved Post
        run: |
          echo "SPEC Spark post approved."
          echo "Ready to publish to:"
          echo "- Facebook"
          echo "- Instagram"
          echo "- X"
          echo "- TikTok"

  weekly-highlights:
    if: github.event.schedule == '23 12 * * 1'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SPEC Website
        uses: actions/checkout@v4

      - name: Generate Weekly Highlights
        run: |
          echo "# SPEC Weekly Pediatric Education Highlights" > highlights.md
          echo "" >> highlights.md
          find . -name "*.html" -exec grep "<title>" {} \; >> highlights.md || true
          echo "" >> highlights.md
          echo "Visit SPEC Pediatric Education Collaborative:" >> highlights.md
          echo "https://specpediatrics.github.io" >> highlights.md

      - name: Display Highlights
        run: cat highlights.md

  research-scan:
    if: github.event.schedule == '29 13 * * 3'
    runs-on: ubuntu-latest

    steps:
      - name: Pediatric Research Scanner
        run: |
          echo "# SPEC Pediatric Research Highlights" > research.md
          echo "" >> research.md
          echo "Topics scanned:" >> research.md
          echo "- Pediatric tracheostomy" >> research.md
          echo "- Children with medical complexity" >> research.md
          echo "- Pediatric critical care" >> research.md
          echo "- Pediatric pulmonology" >> research.md
          echo "" >> research.md
          echo "Recent literature available on PubMed:" >> research.md
          echo "https://pubmed.ncbi.nlm.nih.gov/" >> research.md

      - name: Display Research Highlights
        run: cat research.md

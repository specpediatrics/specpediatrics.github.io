name: SPEC Spark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * 1'

jobs:
  spark:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout SPEC Website
        uses: actions/checkout@v3

      - name: Extract SPEC Content
        run: |
          echo "Scanning SPEC pages..."
          grep -h "<title>" *.html > titles.txt
          cat titles.txt

      - name: Generate Social Media Post
        run: |
          echo "🩺 New from SPEC Pediatric Education Collaborative" > post.txt
          echo "" >> post.txt
          echo "Explore education resources for trainees and families." >> post.txt
          echo "" >> post.txt
          echo "https://specpediatrics.github.io" >> post.txt
          echo "" >> post.txt
          echo "#tracheostomy #complexcare #childrenwithmedicalcomplexity" >> post.txt 
          echo "#pediatrics #meded #PICU #familyeducation" >> post.txt

      - name: Display Post
        run: cat post.txt
      - name: Suggest Reposts
        run: |
          echo "" >> report.txt
          echo "Suggested repost topics:" >> report.txt
          echo "- Pediatric tracheostomy education threads" >> report.txt
          echo "- Complex care family stories" >> report.txt
          echo "- PICU airway education videos" >> report.txt
          scout:
    runs-on: ubuntu-latest

    steps:

      - name: Monitor Pediatric Education Trends
        run: |
          echo "SPEC Spark Social Media Monitoring Report" > report.txt
          echo "" >> report.txt
          echo "Platforms monitored:" >> report.txt
          echo "- X / Twitter" >> report.txt
          echo "- Instagram" >> report.txt
          echo "- Facebook" >> report.txt
          echo "- TikTok" >> report.txt
          echo "- YouTube" >> report.txt
          echo "" >> report.txt
          echo "Key hashtags tracked:" >> report.txt
          echo "#tracheostomy" >> report.txt
          echo "#complexcare" >> report.txt
          echo "#childrenwithmedicalcomplexity" >> report.txt
          echo "#childhealthcare" >> report.txt
          echo "#meded" >> report.txt
          echo "#pediatrics" >> report.txt

      - name: Display Social Media Report
        run: cat report.txt

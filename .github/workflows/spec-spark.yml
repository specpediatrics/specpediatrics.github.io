name: SPEC Spark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'     # Daily 06:00 Texas
    - cron: '0 12 * * 1'     # Weekly highlights Monday

  issues:
    types: [labeled]

jobs:

# DAILY SCAN + DRAFT GENERATION
  spark-draft:

    if: github.event_name != 'issues'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout SPEC Website
        uses: actions/checkout@v3

      - name: Detect SPEC Pages
        run: |
          echo "Scanning SPEC pages..."
          ls *.html > pages.txt || true
          cat pages.txt || true

      - name: Extract Titles
        run: |
          grep -h "<title>" *.html > titles.txt || true
          cat titles.txt || true

      - name: Generate Draft Social Media Post
        run: |

          echo "SPEC Spark Draft Social Media Post" > draft.txt
          echo "" >> draft.txt
          echo "New pediatric education resources from SPEC." >> draft.txt
          echo "https://specpediatrics.github.io" >> draft.txt
          echo "" >> draft.txt

          echo "FACEBOOK:" >> draft.txt
          echo "Explore pediatric education resources for families and trainees." >> draft.txt
          echo "#pediatrics #complexcare #familyeducation" >> draft.txt
          echo "" >> draft.txt

          echo "X POST:" >> draft.txt
          echo "🩺 New pediatric education from SPEC!" >> draft.txt
          echo "#tracheostomy #PICU #meded" >> draft.txt
          echo "" >> draft.txt

          echo "INSTAGRAM:" >> draft.txt
          echo "Helping families understand complex pediatric care." >> draft.txt
          echo "#pediatrics #complexcarekids #tracheostomy #PICU" >> draft.txt
          echo "" >> draft.txt

          echo "TIKTOK IDEA:" >> draft.txt
          echo "Explain pediatric tracheostomy care in 60 seconds." >> draft.txt

      - name: Create Review Issue
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "SPEC Spark Social Media Draft"
          content-filepath: draft.txt
          labels: draft


# APPROVAL SYSTEM
  approved-post:

    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest

    steps:

      - name: Approved Social Media Post
        run: |
          echo "SPEC Spark post approved."
          echo ""
          echo "Ready to publish to social media:"
          echo "Facebook"
          echo "Instagram"
          echo "X"
          echo "TikTok"


# WEEKLY EDUCATION HIGHLIGHTS
  weekly-highlights:

    if: github.event.schedule == '0 12 * * 1'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout SPEC Website
        uses: actions/checkout@v3

      - name: Generate Pediatric Education Highlights
        run: |

          echo "SPEC Weekly Pediatric Education Highlights" > highlights.txt
          echo "" >> highlights.txt

          grep -h "<title>" *.html >> highlights.txt || true

          echo "" >> highlights.txt
          echo "Visit SPEC:" >> highlights.txt
          echo "https://specpediatrics.github.io"

      - name: Display Highlights
        run: cat highlights.txt

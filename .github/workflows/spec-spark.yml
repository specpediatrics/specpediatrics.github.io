name: SPEC Spark

on:
  workflow_dispatch:

  schedule:
    - cron: '0 11 * * *'     # Daily 06:00 Texas
    - cron: '0 12 * * 1'     # Weekly highlights Monday

  issues:
    types: [labeled]

jobs:

# DAILY WEBSITE SCAN
  detect-changes:

    if: github.event_name != 'issues'
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.detect.outputs.changed }}

    steps:

      - name: Checkout SPEC Website
        uses: actions/checkout@v3

      - name: Detect Website Changes
        id: detect
        run: |
          echo "Checking for changes in website..."

          git fetch origin

          CHANGES=$(git diff HEAD~1 HEAD -- '*.html' | wc -l)

          if [ "$CHANGES" -gt "0" ]; then
            echo "Website updates detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No updates detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi


# GENERATE SOCIAL MEDIA DRAFT IF CHANGE DETECTED
  spark-draft:

    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout SPEC Website
        uses: actions/checkout@v3

      - name: Extract Page Titles
        run: |
          grep -h "<title>" *.html > titles.txt || true

      - name: Generate Social Media Draft
        run: |

          echo "SPEC Spark Draft Social Media Post" > draft.txt
          echo "" >> draft.txt

          echo "New pediatric education resources available from SPEC." >> draft.txt
          echo "https://specpediatrics.github.io" >> draft.txt
          echo "" >> draft.txt

          echo "FACEBOOK:" >> draft.txt
          echo "Explore education for families and trainees." >> draft.txt
          echo "#pediatrics #complexcare #familyeducation" >> draft.txt
          echo "" >> draft.txt

          echo "X POST:" >> draft.txt
          echo "🩺 New pediatric education from SPEC!" >> draft.txt
          echo "#tracheostomy #PICU #meded" >> draft.txt
          echo "" >> draft.txt

          echo "INSTAGRAM CAPTION:" >> draft.txt
          echo "Helping families understand complex pediatric care." >> draft.txt
          echo "#pediatrics #complexcarekids #tracheostomy #PICU" >> draft.txt
          echo "" >> draft.txt

          echo "TIKTOK VIDEO IDEA:" >> draft.txt
          echo "Explain pediatric tracheostomy care in 60 seconds." >> draft.txt

      - name: Create Review Issue
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "SPEC Spark Social Media Draft"
          content-filepath: draft.txt
          labels: draft


# APPROVAL SYSTEM
  approved-post:

    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest

    steps:

      - name: Prepare Approved Post
        run: |
          echo "SPEC Spark post approved."
          echo "Ready to publish to:"
          echo "Facebook"
          echo "Instagram"
          echo "X"
          echo "TikTok"


# WEEKLY EDUCATION HIGHLIGHTS
  weekly-highlights:

    if: github.event.schedule == '0 12 * * 1'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout SPEC Website
        uses: actions/checkout@v3

      - name: Generate Weekly Highlights
        run: |

          echo "SPEC Weekly Pediatric Education Highlights" > highlights.txt
          echo "" >> highlights.txt

          grep -h "<title>" *.html >> highlights.txt || true

          echo "" >> highlights.txt
          echo "Visit SPEC Pediatric Education Collaborative:" >> highlights.txt
          echo "https://specpediatrics.github.io"

      - name: Display Highlights
        run: cat highlights.txt

          research-scan:

    runs-on: ubuntu-latest

    if: github.event.schedule == '0 13 * * 3'

    steps:

      - name: Pediatric Research Scanner
        run: |

          echo "SPEC Pediatric Research Highlights" > research.txt
          echo "" >> research.txt

          echo "Topics scanned:" >> research.txt
          echo "- Pediatric tracheostomy" >> research.txt
          echo "- Children with medical complexity" >> research.txt
          echo "- Pediatric critical care" >> research.txt
          echo "- Pediatric pulmonology" >> research.txt
          echo "" >> research.txt

          echo "Recent literature available on PubMed." >> research.txt
          echo "https://pubmed.ncbi.nlm.nih.gov/" >> research.txt

      - name: Display Research Highlights
        run: cat research.txt
